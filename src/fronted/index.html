<!DOCTYPE html>
<html>
<head>
  <title>NOOR-X PAIRING</title>
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
      display: flex;
      justify-content: center;
      align-items: center;
      min-height: 100vh;
      background: linear-gradient(135deg, #0f172a 0%, #1e293b 100%);
      color: white;
      padding: 20px;
    }

    .container {
      background: linear-gradient(135deg, #1e293b 0%, #2d3e50 100%);
      padding: 40px;
      border-radius: 15px;
      width: 100%;
      max-width: 400px;
      text-align: center;
      box-shadow: 0 10px 40px rgba(0, 0, 0, 0.5);
      border: 1px solid rgba(34, 197, 94, 0.2);
    }

    h1 {
      font-size: 28px;
      margin-bottom: 10px;
      color: #22c55e;
      font-weight: bold;
    }

    .subtitle {
      font-size: 13px;
      color: #94a3b8;
      margin-bottom: 30px;
    }

    label {
      display: block;
      font-size: 12px;
      color: #cbd5e1;
      margin-bottom: 8px;
      text-align: left;
      font-weight: 500;
    }

    input {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border-radius: 8px;
      border: 2px solid #334155;
      background: #0f172a;
      color: white;
      font-size: 16px;
      transition: all 0.3s ease;
    }

    input:focus {
      outline: none;
      border-color: #22c55e;
    }

    button {
      width: 100%;
      padding: 12px;
      margin-bottom: 15px;
      border: none;
      background: linear-gradient(135deg, #22c55e 0%, #16a34a 100%);
      color: white;
      border-radius: 8px;
      font-weight: bold;
      cursor: pointer;
      transition: all 0.3s ease;
    }

    button:hover:not(:disabled) {
      transform: translateY(-2px);
      box-shadow: 0 5px 20px rgba(34, 197, 94, 0.4);
    }

    button:disabled {
      background: #64748b;
      cursor: not-allowed;
    }

    .code-section {
      margin-top: 20px;
      padding: 20px;
      background: rgba(15, 23, 42, 0.8);
      border-radius: 10px;
      border: 2px solid #334155;
    }

    .code-label {
      font-size: 11px;
      color: #94a3b8;
      text-transform: uppercase;
      margin-bottom: 10px;
      letter-spacing: 1px;
    }

    .code {
      font-size: 28px;
      background: #0f172a;
      padding: 15px;
      border-radius: 8px;
      font-weight: bold;
      color: #22c55e;
      font-family: 'Courier New', monospace;
      letter-spacing: 2px;
      word-break: break-all;
      min-height: 50px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .message {
      margin-bottom: 15px;
      padding: 12px;
      border-radius: 8px;
      font-size: 13px;
      display: none;
      border: 1px solid;
    }

    .message.success {
      background: rgba(34, 197, 94, 0.2);
      color: #86efac;
      border-color: #22c55e;
      display: block;
    }

    .message.error {
      background: rgba(239, 68, 68, 0.2);
      color: #fca5a5;
      border-color: #ef4444;
      display: block;
    }

    .message.info {
      background: rgba(59, 130, 246, 0.2);
      color: #93c5fd;
      border-color: #3b82f6;
      display: block;
    }

    .loading {
      display: inline-block;
      width: 16px;
      height: 16px;
      border: 2px solid #22c55e;
      border-top: 2px solid transparent;
      border-radius: 50%;
      animation: spin 1s linear infinite;
      margin-right: 8px;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    .copy-btn {
      background: #3b82f6;
      display: none;
    }

    .copy-btn:hover {
      background: #2563eb;
    }
  </style>
</head>
<body>

<div class="container">
  <h1>🚀 NOOR-X PAIRING</h1>
  <p class="subtitle">Connect your WhatsApp account</p>

  <div class="message" id="message"></div>

  <label>WhatsApp Number (with country code)</label>
  <input id="phone" type="text" placeholder="e.g. 256704900001" maxlength="20" />
  
  <button id="getCodeBtn" onclick="getCode()">Get Pairing Code</button>

  <div class="code-section">
    <div class="code-label">Pairing Code:</div>
    <div class="code" id="code">---</div>
    <button class="copy-btn" id="copyBtn" onclick="copyCode()">📋 Copy Code</button>
  </div>

  <div class="subtitle" style="margin-top: 20px;">
    Enter phone number and get your pairing code
  </div>
</div>

<script>
const phoneInput = document.getElementById('phone');
const codeDiv = document.getElementById('code');
const messageDiv = document.getElementById('message');
const getCodeBtn = document.getElementById('getCodeBtn');
const copyBtn = document.getElementById('copyBtn');

function showMessage(text, type = 'info') {
  messageDiv.innerText = text;
  messageDiv.className = `message ${type}`;
}

function showLoading(show = true) {
  if (show) {
    codeDiv.innerHTML = '<span class="loading"></span>Loading...';
    getCodeBtn.disabled = true;
    copyBtn.style.display = 'none';
  } else {
    getCodeBtn.disabled = false;
  }
}

async function getCode() {
  const phone = phoneInput.value.trim();

  if (!phone) {
    showMessage('❌ Enter your WhatsApp number', 'error');
    return;
  }

  if (!/^\d+$/.test(phone)) {
    showMessage('❌ Only numbers allowed (no + or spaces)', 'error');
    return;
  }

  if (phone.length < 10) {
    showMessage('❌ Phone number too short', 'error');
    return;
  }

  showLoading(true);
  showMessage('⏳ Connecting to WhatsApp...', 'info');

  try {
    const response = await fetch('http://localhost:3000/api/pair', {
      method: 'POST',
      headers: { 
        'Content-Type': 'application/json'
      },
      body: JSON.stringify({
        userId: 'user_' + Date.now() + '_' + phone,
        phoneNumber: phone
      })
    });

    const data = await response.json();

    if (data.success && data.code) {
      codeDiv.innerText = data.code;
      copyBtn.style.display = 'block';
      showMessage('✅ Code ready! Open WhatsApp → Linked Devices → Link a Device', 'success');
    } else if (data.message && data.message.includes('already running')) {
      codeDiv.innerText = 'SESSION ACTIVE';
      showMessage('⚠️ Session already exists for this number', 'error');
    } else {
      codeDiv.innerText = '❌ FAILED';
      showMessage(data.message || '❌ Failed to generate code', 'error');
    }

  } catch (err) {
    codeDiv.innerText = '❌ ERROR';
    showMessage('❌ Server error: ' + err.message, 'error');
  }

  showLoading(false);
}

function copyCode() {
  const code = codeDiv.innerText;
  if (!code || code.includes('FAILED') || code.includes('ERROR') || code === '---') {
    showMessage('❌ No valid code to copy', 'error');
    return;
  }

  navigator.clipboard.writeText(code).then(() => {
    showMessage('✅ Code copied to clipboard!', 'success');
  }).catch(() => {
    alert('Could not copy');
  });
}

phoneInput.addEventListener('keypress', (e) => {
  if (e.key === 'Enter') getCode();
});
</script>

</body>
</html>
